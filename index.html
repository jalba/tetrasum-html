<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tetrasum-html/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tetrasum-poc</title>
    <script
      type="module"
      crossorigin
      src="/tetrasum-html/assets/index-ByjhMiQA.js"
    ></script>
    <link
      rel="stylesheet"
      crossorigin
      href="/tetrasum-html/assets/index-B15DvouA.css"
    />
  </head>
  <body>
    <div id="app"></div>
    <dialog class="win-dialog">
      <div class="modal-header">
        <slot name="header"> you won!!! </slot>
      </div>
      <div class="modal-body">
        <slot name="body"> Play again? </slot>
      </div>
      <div class="modal-footer">
        <slot name="footer">
          <button class="modal-default-button new-game">New game</button>
          <button class="modal-default-button close">Cancel</button>
        </slot>
      </div>
    </dialog>
    <dialog class="new-game-dialog">
      <div class="modal-header">
        <slot name="header"> New game </slot>
      </div>
      <div class="modal-body">
        <slot name="body"> Are you sure you want to start a new game? </slot>
      </div>
      <div class="modal-footer">
        <slot name="footer">
          <button class="modal-default-button new-game">New game</button>
          <button class="modal-default-button close">Cancel</button>
        </slot>
      </div>
    </dialog>
    <dialog class="settings">
      <div class="modal-header">
        <slot name="header"> Options </slot>
      </div>
      <div class="modal-body">
        <slot name="body">
          <div class="dialog-button">
            <a class="new-game">New Game</a>
          </div>
        </slot>
        <div class="dialog-button">
          <a class="how-to">How to play?</a>
        </div>
      </div>
      <div class="modal-footer">
        <slot name="footer">
          <div class="dialog-button">
            <a class="cancel">Cancel</a>
          </div>
        </slot>
      </div>
    </dialog>
    <dialog class="how-to-dialog">
      <div class="modal-header">
        <slot name="header"> How to play? </slot>
      </div>
      <div class="modal-body">
        <slot name="body">
          <img src="/tetrasum-html/tetrasum.gif" />
          <p>
            The objective of the game is to sum up squares so that you finish in
            one of the light blue target squares:
          </p>
          <img class="explain" src="/tetrasum-html/target.png" />
          <p>with the amount indicated by the solution squares:</p>
          <img class="explain" src="/tetrasum-html/solution.png" />
        </slot>
      </div>
      <div class="modal-footer">
        <slot name="footer">
          <div class="dialog-button">
            <a class="cancel how">Got it</a>
          </div>
        </slot>
      </div>
    </dialog>
  </body>
</html>
